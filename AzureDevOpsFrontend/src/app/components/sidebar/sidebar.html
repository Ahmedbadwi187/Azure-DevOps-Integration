<div class="sidebar-container">
  <button class="toggle-btn" (click)="toggleCollapse()" [attr.title]="isCollapsed ? 'Expand Menu' : 'Collapse Menu'">
    <span class="arrow-icon">{{ isCollapsed ? '→' : '←' }}</span>
  </button>

  <div class="logo-section">
    <div class="logo-icon">∞</div>
    <div class="logo-text">DevOps Portal</div>
  </div>

  <nav class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">📊</span>
      <span class="nav-text">Dashboard</span>
    </a>
    <a routerLink="/ci" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">⚡</span>
      <span class="nav-text">CI Pipelines</span>
    </a>
    <a routerLink="/cd" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">🚀</span>
      <span class="nav-text">CD Pipelines</span>
    </a>
  </nav>

  <div class="connection-info" *ngIf="isConfigured">
    <div class="org-tag">
      <div class="org-status-dot"></div>
      <span class="org-text" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;">
        Org: {{ organizationName }}
      </span>
    </div>
    <button (click)="logout()" class="nav-item logout-btn" style="width: 100%; text-align: left; background: none; outline: none; border: none; cursor: pointer; display: flex; align-items: center; margin-top: 0.5rem;">
      <svg class="logout-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      <span class="logout-text">Logout</span>
    </button>
  </div>
</div>
